[dependencies]
implementation = ["kotlin-stdlib", "androidx.appcompat:appcompat:1.6.1", "androidx.core:core-ktx:1.10.1", "com.google.android.material:material:1.9.0"]

[android]
namespace = "com.example.smscrypto"
compileSdk = 34
minSdk = 23
targetSdk = 34
manifest = "src/main/AndroidManifest.xml"
